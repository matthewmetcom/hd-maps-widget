<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HD Maps Address</title>
  <link rel="stylesheet" href="widget.css?v=4" />
  <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
</head>
<body>
  <h2>Address &amp; Timezone Lookup</h2>

  <div id="primaryField" class="field">
    <label for="primaryInput">Location (primary)</label>
    <input id="primaryInput" type="text" placeholder="Start typing an address…" autocomplete="off" />
    <div class="hint">Sets address, coordinates, Place ID &amp; timezone</div>
  </div>

  <div id="startField" class="field hidden">
    <label for="startInput">Start Location</label>
    <input id="startInput" type="text" placeholder="Start typing an address…" autocomplete="off" />
  </div>

  <div id="finishField" class="field hidden">
    <label for="finishInput">Finish Location</label>
    <input id="finishInput" type="text" placeholder="Start typing an address…" autocomplete="off" />
  </div>

  <div class="actions">
    <button id="applyBtn" class="btn primary" disabled>Apply Address</button>
    <button id="cancelBtn" class="btn">Cancel</button>
  </div>

  <div id="status" class="status"></div>

  <!-- Offline lat/lng → IANA timezone (no API call needed) -->
  <script src="tz.js?v=4"></script>
  <!-- App logic (external — Zoho's widget CSP blocks inline scripts) -->
  <script src="widget.js?v=4"></script>
  <!-- Google Maps + Places. Loads after widget.js so __initMaps is defined. -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCdimnfvVQYKNa_LOLpcXRQexaLu5wXYqY&libraries=places&callback=__initMaps"
    async defer></script>
</body>
</html>
